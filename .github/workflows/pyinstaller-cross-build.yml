name: PyInstaller Cross Build

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build
        required: true
        default: master

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS artifact
        run: python -X utf8 scripts/build_pyinstaller.py --local-only

      - name: Zip macOS artifact
        run: |
          package_dir="release/macos-package"
          mkdir -p "${package_dir}"
          cp -R dist/pyinstaller/macos/SignSignIn.app "${package_dir}/SignSignIn.app"
          mkdir -p "${package_dir}/resources"
          cp -R resources/. "${package_dir}/resources/"
          find "${package_dir}/resources" -type d -name "__pycache__" -prune -exec rm -rf {} +
          find "${package_dir}/resources" -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.log" \) -delete
          rm -f \
            "${package_dir}/resources/config/session_cache.json" \
            "${package_dir}/resources/config/mitm_code.json" \
            "${package_dir}/resources/config/mitm_cert_state.json"
          mkdir -p \
            "${package_dir}/resources/cert" \
            "${package_dir}/resources/config" \
            "${package_dir}/resources/img" \
            "${package_dir}/resources/journals" \
            "${package_dir}/resources/logs" \
            "${package_dir}/resources/mitm/addons" \
            "${package_dir}/resources/mitm/conf" \
            "${package_dir}/resources/software"
          ditto -c -k --sequesterRsrc --keepParent "${package_dir}" release/sign-sign-in-macos-${{ inputs.git_ref }}.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-macos-${{ inputs.git_ref }}
          path: release/*.zip
