name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag, e.g. v1.2.2
        required: true
      release_name:
        description: Optional release title
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka
        shell: cmd
        run: scripts\build-nuitka.bat

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Tag is required" >&2
            exit 1
          fi

          release_name="${{ github.event.inputs.release_name }}"
          if [[ -z "$release_name" ]]; then
            release_name="Sign sign In 校园邦签到工具 ${tag}"
          fi

          versioned_name="sign.sign.in.${tag}.exe"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "asset_name=$versioned_name" >> "$GITHUB_OUTPUT"

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp out/main.exe "release/${{ steps.meta.outputs.asset_name }}"
          cp README.md release/
          cp LICENSE release/

      - name: Upload release build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.meta.outputs.tag }}-windows
          path: release/*

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          files: |
            release/${{ steps.meta.outputs.asset_name }}
            release/README.md
            release/LICENSE
