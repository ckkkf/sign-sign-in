name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, e.g. v1.2.3
        required: true
        default: v0.0.0
      release_name:
        description: Optional release title
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with Nuitka
        shell: cmd
        run: scripts\build-nuitka.bat

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp out/main.exe release/sign-sign-in-windows.exe
          cp README.md release/
          cp LICENSE release/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sign-sign-in-windows
          path: release/*

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Tag is required" >&2
            exit 1
          fi

          release_name="${{ github.event.inputs.release_name }}"
          if [[ -z "$release_name" ]]; then
            release_name="$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          files: |
            release/sign-sign-in-windows.exe
            release/README.md
            release/LICENSE
