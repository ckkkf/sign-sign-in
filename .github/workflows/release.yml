name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag, e.g. v1.2.2
        required: true
      release_name:
        description: Optional release title
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "Tag is required" >&2
            exit 1
          fi

          release_name="${{ github.event.inputs.release_name }}"
          if [[ -z "$release_name" ]]; then
            release_name="Sign sign In Release ${tag}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"

      - name: Verify tag points to master history
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          git fetch origin master --tags --force

          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} does not exist in repository." >&2
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "refs/tags/${tag}")"
          master_commit="$(git rev-parse origin/master)"

          if ! git merge-base --is-ancestor "${tag_commit}" "${master_commit}"; then
            echo "Tag ${tag} is not on master history; release is restricted to master tags." >&2
            exit 1
          fi

  build-windows:
    needs: verify-tag
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows artifact with PyInstaller
        shell: cmd
        run: scripts\build-pyinstaller.bat --local-only

      - name: Prepare Windows artifact
        shell: bash
        run: |
          mkdir -p release
          cp dist/pyinstaller/windows/SignSignIn.exe release/sign-sign-in-windows.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ needs.verify-tag.outputs.tag }}
          path: release/sign-sign-in-windows.exe

  build-macos:
    needs: verify-tag
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS artifact with PyInstaller
        run: python -X utf8 scripts/build_pyinstaller.py --local-only

      - name: Prepare macOS artifact
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent dist/pyinstaller/macos release/sign-sign-in-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ needs.verify-tag.outputs.tag }}
          path: release/sign-sign-in-macos.zip

  publish-release:
    needs:
      - verify-tag
      - build-windows
      - build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-${{ needs.verify-tag.outputs.tag }}
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos-${{ needs.verify-tag.outputs.tag }}
          path: release

      - name: Prepare release attachments
        shell: bash
        run: |
          cp README.md release/
          cp LICENSE release/

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-tag.outputs.tag }}
          name: ${{ needs.verify-tag.outputs.release_name }}
          generate_release_notes: true
          files: |
            release/sign-sign-in-windows.exe
            release/sign-sign-in-macos.zip
            release/README.md
            release/LICENSE
