name: Preview Build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-preview:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: cmd
        run: scripts\build-pyinstaller.bat --local-only

      - name: Prepare preview artifact
        shell: bash
        run: |
          package_dir="preview/windows-package"
          mkdir -p "${package_dir}"
          short_sha="${GITHUB_SHA::7}"
          cp dist/pyinstaller/windows/SignSignIn.exe "${package_dir}/SignSignIn.exe"
          mkdir -p "${package_dir}/resources"
          cp -R resources/. "${package_dir}/resources/"
          find "${package_dir}/resources" -type d -name "__pycache__" -prune -exec rm -rf {} +
          find "${package_dir}/resources" -type f \( -name "*.pyc" -o -name "*.pyo" -o -name "*.log" \) -delete
          mkdir -p \
            "${package_dir}/resources/cert" \
            "${package_dir}/resources/config" \
            "${package_dir}/resources/img" \
            "${package_dir}/resources/journals" \
            "${package_dir}/resources/logs" \
            "${package_dir}/resources/mitm/addons" \
            "${package_dir}/resources/mitm/conf" \
            "${package_dir}/resources/software"
          cd preview
          powershell -NoProfile -Command "Compress-Archive -Path 'windows-package\\*' -DestinationPath 'sign-sign-in-preview-${short_sha}.zip' -Force"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-windows-${{ github.sha }}
          path: preview/sign-sign-in-preview-*.zip
